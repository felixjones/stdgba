name: Docs

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mdBook
        shell: bash
        env:
          MDBOOK_VERSION: v0.5.2
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          MDBOOK_TARBALL="mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          MDBOOK_URL="https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/${MDBOOK_TARBALL}"
          echo "Downloading ${MDBOOK_URL}"
          curl --fail --silent --show-error --location "${MDBOOK_URL}" \
            | tar -xz -C "$HOME/.local/bin" mdbook
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build book
        shell: bash
        run: |
          set -euo pipefail
          mdbook --version
          mdbook build book

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/output

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
